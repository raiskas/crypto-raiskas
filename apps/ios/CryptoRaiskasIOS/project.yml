name: CryptoRaiskasIOS
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    PRODUCT_BUNDLE_IDENTIFIER: "com.raiskas.ios"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.9.1
targets:
  CryptoRaiskasIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
      - path: Config.local.plist
        optional: true
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: "Crypto Raiskas"
        GENERATE_INFOPLIST_FILE: YES
        GENERATE_LAUNCH_SCREEN_FILE: YES
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_CFBundleName: "Crypto Raiskas"
        INFOPLIST_KEY_CFBundleDisplayName: "Crypto Raiskas"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.finance"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Supabase
        product: Supabase
schemes:
  CryptoRaiskasIOS:
    build:
      targets:
        CryptoRaiskasIOS: all
    run:
      config: Debug
    archive:
      config: Release
