name: CryptoRaiskasIOS
options:
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    PRODUCT_BUNDLE_IDENTIFIER: "com.raiskas.ios.dev2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.9.1
targets:
  CryptoRaiskasIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
      - path: Config.plist
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: "Crypto Raiskas"
        GENERATE_INFOPLIST_FILE: YES
        GENERATE_LAUNCH_SCREEN_FILE: YES
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_CFBundleName: "Crypto Raiskas"
        INFOPLIST_KEY_CFBundleDisplayName: "Crypto Raiskas"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.finance"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: CryptoRaiskasIOS.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: Supabase
        product: Supabase
      - target: CryptoRaiskasWidgets
        embed: true
      - target: CryptoRaiskasWatchApp
        embed: true
  CryptoRaiskasWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets/CryptoRaiskasWidgets
      - path: Widgets/CryptoRaiskasWidgets/logo-sem-fundo.png
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: "Crypto Raiskas Widgets"
        PRODUCT_BUNDLE_IDENTIFIER: "com.raiskas.ios.dev2.widgets"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Widgets/CryptoRaiskasWidgets/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_ENTITLEMENTS: CryptoRaiskasWidgets.entitlements
        CODE_SIGN_STYLE: Automatic
  CryptoRaiskasWatchApp:
    type: com.apple.product-type.application.watchapp2
    platform: watchOS
    sources:
      - path: Watch/CryptoRaiskasWatchApp
    settings:
      base:
        PRODUCT_NAME: "Crypto Raiskas Watch"
        PRODUCT_BUNDLE_IDENTIFIER: "com.raiskas.ios.dev2.watchkitapp"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Watch/CryptoRaiskasWatchApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: WatchAppIcon
        ASSETCATALOG_COMPILER_COMPLICATION_NAME: ""
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: CryptoRaiskasWatchExtension
        embed: true
  CryptoRaiskasWatchExtension:
    type: com.apple.product-type.watchkit2-extension
    platform: watchOS
    sources:
      - path: Watch/CryptoRaiskasWatchExtension
    settings:
      base:
        PRODUCT_NAME: "Crypto Raiskas Watch Extension"
        PRODUCT_BUNDLE_IDENTIFIER: "com.raiskas.ios.dev2.watchkitapp.watchkitextension"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Watch/CryptoRaiskasWatchExtension/Info.plist
        ASSETCATALOG_COMPILER_COMPLICATION_NAME: ""
        CODE_SIGN_STYLE: Automatic
schemes:
  CryptoRaiskasIOS:
    build:
      targets:
        CryptoRaiskasIOS: all
        CryptoRaiskasWidgets: all
    run:
      config: Debug
    archive:
      config: Release
  CryptoRaiskasWatch:
    build:
      targets:
        CryptoRaiskasWatchApp: all
        CryptoRaiskasWatchExtension: all
    run:
      config: Debug
