name: RaiskasMac
options:
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    PRODUCT_BUNDLE_IDENTIFIER: "com.raiskas.macos"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.9.1
targets:
  RaiskasMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
      - path: Config.local.plist
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: "Crypto Raiskas"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleName: Crypto Raiskas
        INFOPLIST_KEY_CFBundleDisplayName: Crypto Raiskas
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.finance
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Raiskas"
    dependencies:
      - package: Supabase
        product: Supabase
schemes:
  RaiskasMac:
    build:
      targets:
        RaiskasMac: all
    run:
      config: Debug
    archive:
      config: Release
